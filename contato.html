      <div class="brand">
        <span class="brand-name">Guilherme Gabriel</span>
        <span class="brand-role">Desenvolvedor Web</span>
      </div>

      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">☰</button>

      <nav class="site-nav" id="siteNav">

  <main>
   </main> <!-- Seção Contato -->
    <section class="section section-alt">
      <div class="container">
        <h1>Contato</h1>
        <p>Preencha o formulário abaixo para entrar em contato comigo.</p>

        <!-- Formulário com validação em JavaScript -->
        <form id="contactForm" class="contact-form" novalidate>
          <label for="</form>nome">Nome</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome" />

          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" />

          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem"></textarea>

          <button type="submit">Enviar</button>
          <p id="formFeedback" class="form-feedback" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>
